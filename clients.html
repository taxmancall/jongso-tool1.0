<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a1a;background:#f8f8f6;min-height:100vh;}
.container{max-width:960px;margin:0 auto;padding:24px 20px;}
.nav-back{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:#888;text-decoration:none;margin-bottom:14px;}
.nav-back:hover{color:#185FA5;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.topbar h1{font-size:18px;font-weight:600;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.sc{background:#fff;border:1px solid #e8e6df;border-radius:10px;padding:10px 12px;}
.sc .lb{font-size:11px;color:#888;margin-bottom:3px;}
.sc .vl{font-size:18px;font-weight:700;}
.nav{display:flex;gap:5px;margin-bottom:14px;}
.nb{padding:7px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:13px;color:#666;font-family:inherit;}
.nb.on{background:#185FA5;border-color:#185FA5;color:#fff;font-weight:600;}
.view{display:none;}.view.on{display:block;}
.cl{display:flex;flex-direction:column;gap:6px;}
.cr{background:#fff;border:1px solid #e8e6df;border-radius:10px;padding:11px 14px;cursor:pointer;transition:border-color .15s;}
.cr:hover{border-color:#aaa;}
.cr.sel{border:2px solid #185FA5;}
.ct{display:flex;align-items:center;justify-content:space-between;}
.cn{font-weight:600;font-size:14px;}
.cm{font-size:12px;color:#888;margin-top:3px;}
.badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:500;}
.bam{background:#FAEEDA;color:#633806;} .bbl{background:#E6F1FB;color:#0C447C;} .brd{background:#FCEBEB;color:#791F1F;} .bgn{background:#EAF3DE;color:#27500A;} .bgy{background:#F1EFE8;color:#444441;}
.fa{font-size:13px;font-weight:700;color:#185FA5;}
.dp{background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:18px;margin-top:12px;}
.dh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #f0eeea;}
.dn{font-size:16px;font-weight:700;}
.da{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.st{font-size:11px;font-weight:600;color:#888;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;}
.cbox{background:#f8f8f6;border-radius:10px;padding:12px 14px;}
.crow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #eeede8;font-size:13px;}
.crow:last-child{border-bottom:none;padding-top:8px;}
.cm2{color:#888;} .cbl{color:#185FA5;font-weight:600;} .crd{color:#A32D2D;font-weight:600;} .cgn{color:#3B6D11;font-weight:600;}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.chk{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #f4f3ef;font-size:13px;line-height:1.5;}
.chk:last-child{border-bottom:none;}
.msg-area{background:#f8f8f6;border-radius:10px;padding:13px 15px;font-size:13px;line-height:1.9;white-space:pre-wrap;}
.cpb{margin-top:8px;padding:6px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px;color:#666;font-family:inherit;}
.cpb:hover{background:#f0f0ee;}
.fb{background:#fff;border:1px solid #e8e6df;border-radius:12px;padding:18px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ff{grid-column:1/-1;}
label{font-size:12px;color:#555;display:block;margin-bottom:4px;font-weight:500;}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:13px;font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#185FA5;}
textarea{height:70px;resize:vertical;}
.ir{display:flex;gap:6px;margin-bottom:5px;align-items:center;}
.ir input{flex:1;}
.ir select{width:160px;flex-shrink:0;}
.rb{padding:5px 9px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;color:#666;font-family:inherit;}
.rb:hover{background:#f0f0ee;}
.ab{width:100%;padding:10px;border-radius:10px;border:none;background:#185FA5;color:#fff;cursor:pointer;font-size:14px;font-weight:600;margin-top:10px;font-family:inherit;}
.ab:hover{background:#0C447C;}
.sbs{display:flex;gap:4px;}
.sb{padding:4px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:11px;color:#666;font-family:inherit;}
.sb.on{background:#f0f0ee;font-weight:600;color:#1a1a1a;}
.db{padding:4px 10px;border-radius:6px;border:1px solid #F7C1C1;background:#fff;cursor:pointer;font-size:11px;color:#A32D2D;font-family:inherit;}
.empty{text-align:center;padding:40px 20px;color:#888;font-size:13px;}
.fbl{background:#E6F1FB;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.sec{margin-bottom:14px;}
@media(max-width:600px){.sg{grid-template-columns:1fr 1fr;}.fg{grid-template-columns:1fr;}.cgrid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="container">
<a class="nav-back" href="index.html">← 인덱스로 돌아가기</a>
<div class="topbar">
  <h1>👥 종합소득세 고객 관리</h1>
  <span style="font-size:12px;color:#888;">2025 귀속 · 2026년 5월~6월</span>
</div>

<div class="sg">
  <div class="sc"><div class="lb">총 고객</div><div class="vl" id="s0">0</div></div>
  <div class="sc"><div class="lb">신고 대기</div><div class="vl" style="color:#BA7517" id="s1">0</div></div>
  <div class="sc"><div class="lb">검토 중</div><div class="vl" style="color:#185FA5" id="s2">0</div></div>
  <div class="sc"><div class="lb">신고 완료</div><div class="vl" style="color:#3B6D11" id="s3">0</div></div>
</div>

<div class="nav">
  <button class="nb on" onclick="sv('list')">고객 목록</button>
  <button class="nb" onclick="sv('add')">+ 고객 추가</button>
</div>

<div id="vlist" class="view on">
  <div class="cl" id="clist"></div>
  <div id="det"></div>
</div>

<div id="vadd" class="view">
  <div class="fb">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #f0eeea;">신규 고객 등록</div>
    <div class="fg">
      <div><label>성명</label><input id="fn" placeholder="홍길동"></div>
      <div><label>생년월일</label><input id="fb" placeholder="85.04.27"></div>
      <div><label>안내유형</label>
        <select id="ft">
          <option value="외부조정">외부조정대상자</option>
          <option value="간편장부-기준" selected>간편장부-기준경비율</option>
          <option value="간편장부-단순">간편장부-단순경비율</option>
          <option value="소득률저조">외부조정+소득률저조</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div><label>기장의무</label>
        <select id="fk">
          <option value="간편장부">간편장부대상자</option>
          <option value="복식부기">복식부기의무자</option>
        </select>
      </div>
      <div class="ff">
        <label>업종별 수입금액</label>
        <div id="irows">
          <div class="ir">
            <select class="ic"><option value="940500">940500 인적용역(보험)</option><option value="940909">940909 인적용역(기타)</option><option value="940305">940305 인적용역(기타2)</option><option value="940903">940903 인적용역(기타3)</option><option value="940912">940912 개인서비스업</option><option value="930913">930913 개인서비스업2</option><option value="701201">701201 부동산임대업</option><option value="552107">552107 음식점업</option><option value="749100">749100 사업지원서비스</option><option value="etc">기타업종</option></select>
            <input type="number" class="ia" placeholder="수입금액 (원)">
            <button class="rb" onclick="remRow(this)">✕</button>
          </div>
        </div>
        <button class="rb" style="margin-top:6px;" onclick="addRow()">+ 업종 추가</button>
      </div>
      <div><label>타소득 합산</label>
        <select id="fo">
          <option value="없음">없음</option>
          <option value="근로소득">근로소득</option>
          <option value="연금소득">연금소득</option>
          <option value="금융소득">금융소득(2천만원 초과)</option>
          <option value="기타소득">기타소득</option>
        </select>
      </div>
      <div><label>공동사업 여부</label>
        <select id="fj">
          <option value="단독">단독</option>
          <option value="공동">공동사업자 포함</option>
        </select>
      </div>
      <div><label>국민연금 납부액 (원)</label><input type="number" id="fp" placeholder="0"></div>
      <div><label>원천징수 기납부세액 (원)</label><input type="number" id="fw" placeholder="0"></div>
      <div><label>중간예납세액 (원)</label><input type="number" id="fpp" placeholder="0"></div>
      <div><label>노란우산공제 납입액 (원)</label><input type="number" id="fnk" placeholder="0"></div>
      <div class="ff"><label>메모 / 특이사항</label><textarea id="fm" placeholder="소득률저조, 사업용카드 업무무관 등 특이사항 입력"></textarea></div>
    </div>
    <button class="ab" onclick="addClient()">✓ 고객 등록</button>
  </div>
</div>

<script>
const N=v=>Number(v)||0;
const F=v=>Math.round(v).toLocaleString('ko-KR');
const ER={'940500':.162,'940909':.174,'940305':.266,'940903':.154,'940912':.34,'930913':.166,'701201':.199,'552107':.12,'749100':.224,'etc':.15};
let clients=[],sel=null;

function sv(v){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.nb').forEach(e=>e.classList.remove('on'));
  document.getElementById('v'+v).classList.add('on');
  document.querySelectorAll('.nb')[v==='list'?0:1].classList.add('on');
}

function calcFee(rev,bk,jt){
  let f=0;
  if(bk==='복식부기'){
    if(rev<=300000000)f=330000;
    else if(rev<=500000000)f=330000+Math.round((rev-300000000)*16.5/10000);
    else if(rev<=1000000000)f=495000+Math.round((rev-500000000)*11/10000);
    else f=1661000+Math.round((rev-1000000000)*9.9/10000);
  }else{
    if(rev<24000000)f=110000;
    else if(rev<36000000)f=165000;
    else if(rev<50000000)f=330000;
    else if(rev<100000000)f=330000+Math.round((rev-50000000)*33/10000);
    else f=495000+Math.round((rev-100000000)*16.5/10000);
  }
  if(jt==='공동')f=Math.round(f*1.1);
  return f;
}

function calcTax(inc,pen,nk){
  let d=pen+1500000;
  if(nk>0){let lim=inc<=40000000?6000000:inc<=60000000?5000000:inc<=100000000?4000000:2000000;d+=Math.min(nk,lim);}
  let tb=Math.max(0,inc-d);
  let t=0;
  if(tb<=14000000)t=tb*.06;
  else if(tb<=50000000)t=840000+(tb-14000000)*.15;
  else if(tb<=88000000)t=6240000+(tb-50000000)*.24;
  else if(tb<=150000000)t=15360000+(tb-88000000)*.35;
  else if(tb<=300000000)t=37060000+(tb-150000000)*.38;
  else if(tb<=500000000)t=94060000+(tb-300000000)*.40;
  else if(tb<=1000000000)t=174060000+(tb-500000000)*.42;
  else t=384060000+(tb-1000000000)*.45;
  const cr=Math.min(t*.07,130000);
  const det=Math.max(0,Math.round(t-cr));
  const loc=Math.round(det*.1);
  return{d:Math.round(d),tb:Math.round(tb),det,loc,total:det+loc};
}

function getChecks(c){
  let rev=c.inc.reduce((a,b)=>a+b.a,0);
  let ch=[];
  if(c.bk==='복식부기')ch.push({w:1,t:'복식부기의무자 — 외부세무조정 필수. 세무조정계산서 첨부 필요.'});
  if(c.tp==='소득률저조')ch.push({w:1,t:'소득률 저조 안내 대상자 — 업종·외형별 평균 80% 미만. 사업무관 경비 혼입 여부 정밀 검토 필요.'});
  if(c.jt==='공동')ch.push({w:1,t:'공동사업장 포함 — 지분율·분배명세서 확인 필수. 귀속 소득금액 확정 후 세액 재계산.'});
  if(c.ot&&c.ot!=='없음')ch.push({w:0,t:`타소득 합산 — ${c.ot}. 합산 후 세율 구간 재확인.`});
  if(rev>150000000&&c.bk==='간편장부')ch.push({w:1,t:'수입금액 1.5억 초과 — 업종별 복식부기 기준 초과 여부 소득세법 시행령 제208조 기준 재확인 필요.'});
  if(c.nk>0)ch.push({w:0,t:`노란우산공제 ${F(c.nk)}원 — 소득 규모별 한도 확인 (4천만원이하 600만, 6천만이하 500만, 1억이하 400만, 초과 200만).`});
  if(c.inc.some(i=>i.c==='701201'))ch.push({w:1,t:'부동산임대업 포함 — 임대업 이자비용을 타 사업소득 필요경비로 혼입 주의.'});
  ch.push({w:0,t:'부양가족 인적공제 자료 수령 — 배우자·자녀·부모 공제 확인.'});
  ch.push({w:0,t:'원천징수영수증 기납부세액 대조 — 지급명세서 실제 원천징수내역 일치 확인.'});
  if(c.memo)ch.push({w:1,t:c.memo});
  return ch;
}

function genMsg(c,fee,total){
  let rev=c.inc.reduce((a,b)=>a+b.a,0);
  let pay=total-(N(c.pp)+N(c.wh));
  let ps=pay>0?`추가납부 약 ${F(pay)}원 예상`:`환급 약 ${F(Math.abs(pay))}원 예상`;
  return `안녕하세요, ${c.name} 고객님.\n\n2025년 귀속 종합소득세 신고 안내드립니다.\n\n■ 신고 개요\n총 수입금액: ${F(rev)}원\n기장의무: ${c.bk}대상자 (${c.tp})${c.ot&&c.ot!=='없음'?'\n타소득 합산: '+c.ot:''}\n\n■ 예상 납부세액\n결정세액 추정: 약 ${F(total)}원\n기납부세액: ${F(N(c.pp)+N(c.wh))}원\n→ ${ps}\n(공제 자료 확인 후 정확한 금액 안내드립니다.)\n\n■ 건강보험료·대출 참고사항\n· 이번 신고로 확정된 소득금액은 2026.07~2027.06 대출 심사 기준으로 사용됩니다.\n· 지역가입자(프리랜서·개인사업자)는 소득+재산(주택·토지·자동차 등)을 합산하여 건강보험료가 산정됩니다. 소득 신고액이 높아지면 보험료도 함께 오릅니다.\n· 대출이 필요하신 경우, 신고 전 은행과 필요 소득금액 기준을 미리 협의하시기 바랍니다.\n\n■ 준비해 주실 서류\n① 부양가족 현황 (배우자, 자녀, 부모님 등)\n② 연금저축·퇴직연금 납입 내역 (있는 경우)\n③ 주요경비 증빙 (있는 경우)${c.jt==='공동'?'\n④ 공동사업장 지분율 및 분배명세서':''}\n\n■ 신고 수수료: ${F(fee)}원 (VAT 포함)\n\n서류 준비되시면 연락 주시기 바랍니다.\n감사합니다.`;
}

function renderList(){
  const wrap=document.getElementById('clist');
  if(!clients.length){
    wrap.innerHTML='<div class="empty">👥<br><br>등록된 고객이 없습니다.<br>위 "고객 추가" 버튼으로 등록해주세요.</div>';
    updateS();return;
  }
  wrap.innerHTML=clients.map((c,i)=>{
    let rev=c.inc.reduce((a,b)=>a+b.a,0);
    let fee=calcFee(rev,c.bk,c.jt);
    let sb=c.st==='done'?'bgn':c.st==='review'?'bbl':'bam';
    let sl=c.st==='done'?'신고완료':c.st==='review'?'검토중':'대기중';
    let tb=c.tp==='소득률저조'||c.tp==='외부조정'?'brd':'bam';
    return `<div class="cr${sel===i?' sel':''}" onclick="selC(${i})">
      <div class="ct">
        <div>
          <span class="cn">${c.name}</span>
          <span style="font-size:12px;color:#888;margin-left:7px;">${c.birth}</span>
          <span class="badge bgy" style="margin-left:5px;">${c.bk}</span>
          <span class="badge ${tb}" style="margin-left:3px;">${c.tp}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="fa">${F(fee)}원</span>
          <span class="badge ${sb}">${sl}</span>
        </div>
      </div>
      <div class="cm">수입금액 ${F(rev)}원 · ${c.inc.length}개 업종${c.ot&&c.ot!=='없음'?' · '+c.ot+' 합산':''}${c.jt==='공동'?' · 공동사업':''}</div>
    </div>`;
  }).join('');
  updateS();
}

function selC(i){sel=i;renderList();renderDet(i);}

function renderDet(i){
  const c=clients[i];
  let rev=c.inc.reduce((a,b)=>a+b.a,0);
  let fee=calcFee(rev,c.bk,c.jt);
  let estInc=Math.round(c.inc.reduce((a,b)=>a+b.a*(1-(ER[b.c]||.15)),0));
  let tx=calcTax(estInc,N(c.pen),N(c.nk));
  let checks=getChecks(c);
  let msg=genMsg(c,fee,tx.total);
  let pay=tx.total-(N(c.pp)+N(c.wh));

  document.getElementById('det').innerHTML=`<div class="dp">
    <div class="dh">
      <div>
        <div class="dn">${c.name} <span style="font-size:13px;color:#888;font-weight:400;">${c.birth}</span></div>
        <div class="da">
          <span class="badge bgy">${c.bk}</span>
          <span class="badge ${c.tp==='소득률저조'||c.tp==='외부조정'?'brd':'bam'}">${c.tp}</span>
          ${c.ot&&c.ot!=='없음'?`<span class="badge bbl">${c.ot} 합산</span>`:''}
          ${c.jt==='공동'?`<span class="badge brd">공동사업</span>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
        <div class="sbs">
          <button class="sb${c.st==='wait'?' on':''}" onclick="setSt(${i},'wait')">대기</button>
          <button class="sb${c.st==='review'?' on':''}" onclick="setSt(${i},'review')">검토중</button>
          <button class="sb${c.st==='done'?' on':''}" onclick="setSt(${i},'done')">완료</button>
        </div>
        <button class="db" onclick="delC(${i})">🗑 삭제</button>
      </div>
    </div>

    <div class="sec">
      <div class="st">① 수입금액</div>
      <table style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead><tr style="border-bottom:1px solid #e8e6df;">
          <th style="padding:5px 7px;font-size:11px;font-weight:600;color:#888;">업종코드</th>
          <th style="padding:5px 7px;font-size:11px;font-weight:600;color:#888;text-align:right;">수입금액</th>
          <th style="padding:5px 7px;font-size:11px;font-weight:600;color:#888;text-align:right;">기준경비율</th>
        </tr></thead>
        <tbody>
          ${c.inc.map(r=>`<tr style="border-bottom:1px solid #f4f3ef;">
            <td style="padding:6px 7px;">${r.c}</td>
            <td style="padding:6px 7px;text-align:right;">${F(r.a)}원</td>
            <td style="padding:6px 7px;text-align:right;color:#888;">${((ER[r.c]||.15)*100).toFixed(1)}%</td>
          </tr>`).join('')}
          <tr><td style="padding:7px 7px;font-weight:700;">합계</td><td style="padding:7px 7px;text-align:right;font-weight:700;">${F(rev)}원</td><td></td></tr>
        </tbody>
      </table>
    </div>

    <div class="cgrid">
      <div class="sec">
        <div class="st">② 소득금액 (추계 추정)</div>
        <div class="cbox">
          <div class="crow"><span class="cm2">총 수입금액</span><span>${F(rev)}원</span></div>
          <div class="crow"><span class="cm2">추정 필요경비</span><span class="crd">△ ${F(rev-estInc)}원</span></div>
          <div class="crow"><span style="font-weight:600;">추정 소득금액</span><span class="cbl">${F(estInc)}원</span></div>
        </div>
      </div>
      <div class="sec">
        <div class="st">③ 세액 계산 (추정)</div>
        <div class="cbox">
          <div class="crow"><span class="cm2">소득공제</span><span class="crd">△ ${F(tx.d)}원</span></div>
          <div class="crow"><span class="cm2">과세표준</span><span>${F(tx.tb)}원</span></div>
          <div class="crow"><span class="cm2">소득세+지방세</span><span>${F(tx.det)}+${F(tx.loc)}원</span></div>
          <div class="crow"><span class="cm2">합계 세금</span><span class="cbl">${F(tx.total)}원</span></div>
          <div class="crow"><span class="cm2">기납부세액</span><span class="crd">△ ${F(N(c.pp)+N(c.wh))}원</span></div>
          <div class="crow"><span style="font-weight:700;">${pay>0?'추가납부':'환급'}</span><span class="${pay>0?'crd':'cgn'}" style="font-size:15px;font-weight:700;">${pay>0?'':'-'}${F(Math.abs(pay))}원</span></div>
        </div>
      </div>
    </div>

    <div class="sec">
      <div class="st">④ 신고 전 체크포인트</div>
      ${checks.map(ch=>`<div class="chk">
        <span style="flex-shrink:0;font-size:14px;">${ch.w?'⚠️':'ℹ️'}</span>
        <span style="${ch.w?'color:#A32D2D;':''}">${ch.t}</span>
      </div>`).join('')}
    </div>

    <div class="sec">
      <div class="st">⑤ 수수료</div>
      <div class="fbl">
        <span style="font-size:12px;color:#0C447C;font-weight:500;">🧾 신고대리 수수료 (VAT포함, 원제우세무사 보수표)</span>
        <span style="font-size:18px;font-weight:700;color:#185FA5;">${F(fee)}원</span>
      </div>
    </div>

    <div class="sec">
      <div class="st">⑥ 의뢰인 안내 메시지</div>
      <div class="msg-area" id="msg${i}">${genMsg(c,fee,tx.total)}</div>
      <button class="cpb" onclick="cpMsg(${i})">📋 메시지 복사</button>
    </div>
  </div>`;
}

function setSt(i,s){clients[i].st=s;renderList();renderDet(i);}
function delC(i){if(!confirm(`${clients[i].name} 고객을 삭제하시겠습니까?`))return;clients.splice(i,1);sel=null;document.getElementById('det').innerHTML='';renderList();}
function updateS(){
  document.getElementById('s0').textContent=clients.length;
  document.getElementById('s1').textContent=clients.filter(c=>c.st==='wait').length;
  document.getElementById('s2').textContent=clients.filter(c=>c.st==='review').length;
  document.getElementById('s3').textContent=clients.filter(c=>c.st==='done').length;
}

function addRow(){
  const r=document.createElement('div');r.className='ir';
  r.innerHTML=`<select class="ic"><option value="940500">940500 인적용역(보험)</option><option value="940909">940909 인적용역(기타)</option><option value="940305">940305 인적용역(기타2)</option><option value="940903">940903 인적용역(기타3)</option><option value="940912">940912 개인서비스업</option><option value="930913">930913 개인서비스업2</option><option value="701201">701201 부동산임대업</option><option value="552107">552107 음식점업</option><option value="749100">749100 사업지원서비스</option><option value="etc">기타업종</option></select><input type="number" class="ia" placeholder="수입금액 (원)"><button class="rb" onclick="remRow(this)">✕</button>`;
  document.getElementById('irows').appendChild(r);
}
function remRow(b){const rs=document.querySelectorAll('#irows .ir');if(rs.length>1)b.parentElement.remove();}

function addClient(){
  const name=document.getElementById('fn').value.trim();
  if(!name){alert('성명을 입력하세요.');return;}
  const rows=document.querySelectorAll('#irows .ir');
  const inc=[];
  rows.forEach(r=>{
    const c=r.querySelector('.ic').value;
    const a=N(r.querySelector('.ia').value);
    if(a>0)inc.push({c,a});
  });
  if(!inc.length){alert('수입금액을 하나 이상 입력하세요.');return;}
  clients.push({
    name,birth:document.getElementById('fb').value,
    tp:document.getElementById('ft').value,
    bk:document.getElementById('fk').value,
    inc,ot:document.getElementById('fo').value,
    jt:document.getElementById('fj').value,
    pen:N(document.getElementById('fp').value),
    wh:N(document.getElementById('fw').value),
    pp:N(document.getElementById('fpp').value),
    nk:N(document.getElementById('fnk').value),
    memo:document.getElementById('fm').value,
    st:'wait'
  });
  renderList();sv('list');selC(clients.length-1);
  ['fn','fb','fp','fw','fpp','fnk','fm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('irows').innerHTML=`<div class="ir"><select class="ic"><option value="940500">940500 인적용역(보험)</option><option value="940909">940909 인적용역(기타)</option><option value="940305">940305 인적용역(기타2)</option><option value="940903">940903 인적용역(기타3)</option><option value="940912">940912 개인서비스업</option><option value="930913">930913 개인서비스업2</option><option value="701201">701201 부동산임대업</option><option value="552107">552107 음식점업</option><option value="749100">749100 사업지원서비스</option><option value="etc">기타업종</option></select><input type="number" class="ia" placeholder="수입금액 (원)"><button class="rb" onclick="remRow(this)">✕</button></div>`;
}

function cpMsg(i){
  const t=document.getElementById('msg'+i).textContent;
  navigator.clipboard.writeText(t).then(()=>{
    const b=document.querySelector(`button[onclick="cpMsg(${i})"]`);
    const orig=b.textContent;
    b.textContent='✓ 복사 완료!';
    setTimeout(()=>{b.textContent=orig;},1500);
  }).catch(()=>{
    const t2=document.getElementById('msg'+i);
    const r=document.createRange();r.selectNode(t2);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(r);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
  });
}

renderList();
</script>
</body>
</html>
